<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WolfAI</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#07070f;--surface:#0f0f1a;--card:#13131f;--border:#1e1e30;--accent:#6c5ce7;--accent2:#00cec9;--red:#e17055;--text:#eeeef8;--muted:#6868a0}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);height:100vh;overflow:hidden}
.app-shell{display:flex;height:100vh;width:100vw}

/* SIDEBAR */
.sidebar{width:260px;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;transition:width .2s,opacity .2s}
.sidebar.collapsed{width:0;border:none;overflow:hidden;opacity:0}
.sidebar-header{display:flex;align-items:center;gap:10px;padding:18px 16px 14px}
.logo{width:32px;height:32px;background:linear-gradient(135deg,var(--accent),var(--accent2));border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:800;color:#fff;flex-shrink:0}
.sidebar-header h1{font-size:1rem;font-weight:700}
.new-chat-btn{margin:0 14px 12px;padding:10px 12px;background:var(--card);border:1px solid var(--border);border-radius:10px;color:var(--text);cursor:pointer;font-size:.82rem;font-weight:600;text-align:left;display:flex;align-items:center;gap:8px;font-family:'Inter',sans-serif}
.new-chat-btn:hover{border-color:var(--accent);color:var(--accent)}
.chat-list{flex:1;overflow-y:auto;padding:0 8px}
.chat-list::-webkit-scrollbar{width:4px}
.chat-list::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px}
.chat-item{padding:9px 10px;border-radius:8px;font-size:.78rem;color:var(--muted);cursor:pointer;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:2px;display:flex;align-items:center;justify-content:space-between;gap:6px}
.chat-item:hover{background:var(--card);color:var(--text)}
.chat-item.active{background:rgba(108,92,231,.16);color:var(--text)}
.chat-item span{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.chat-item .del-btn{opacity:0;background:none;border:none;color:var(--muted);font-size:.72rem;cursor:pointer;flex-shrink:0}
.chat-item:hover .del-btn{opacity:1}
.empty-chats{padding:14px 12px;color:var(--muted);font-size:.76rem}
.sidebar-divider{height:1px;background:var(--border);margin:8px 16px}
.nav-item{display:flex;align-items:center;gap:10px;padding:10px 16px;font-size:.8rem;cursor:pointer;color:var(--text)}
.nav-item:hover{background:var(--card)}
.nav-item.disabled{opacity:.35;cursor:not-allowed}
.nav-item .nav-label small{display:block;color:var(--muted);font-size:.66rem;font-weight:400;margin-top:1px}
.user-row{display:flex;align-items:center;gap:10px;padding:14px 16px;font-size:.83rem;font-weight:600;border-top:1px solid var(--border)}
.user-avatar{width:28px;height:28px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--accent2));display:flex;align-items:center;justify-content:center;font-size:.76rem;font-weight:800;color:#fff;flex-shrink:0}
.role-badge{font-size:.65rem;font-weight:600;padding:1px 7px;border-radius:100px;display:inline-block;width:fit-content}
.role-badge.owner{background:rgba(253,203,110,.15);color:#fdcb6e}
.role-badge.mod{background:rgba(0,206,201,.15);color:var(--accent2)}

.mod-panel{max-width:640px;margin:0 auto;width:100%;padding:10px}
.mod-panel h2{font-size:1.1rem;margin-bottom:18px}
.mod-panel h3{font-size:.85rem;color:var(--muted);margin:20px 0 10px;font-weight:600}
.mod-stats{display:flex;gap:12px;margin-bottom:8px}
.mod-stat-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:16px 22px;text-align:center}
.mod-stat-num{font-size:1.6rem;font-weight:800;color:var(--accent2)}
.mod-stat-label{font-size:.74rem;color:var(--muted);margin-top:2px}
.mod-user-list{background:var(--card);border:1px solid var(--border);border-radius:12px;overflow:hidden}
.mod-user-row{display:flex;justify-content:space-between;align-items:center;padding:11px 16px;font-size:.82rem;border-bottom:1px solid var(--border)}
.mod-user-row:last-child{border-bottom:none}
.mod-user-row small{color:var(--muted);font-size:.72rem}

/* MAIN AREA */
.main-area{flex:1;display:flex;flex-direction:column;min-width:0}
.main-header{display:flex;align-items:center;gap:12px;padding:13px 20px;border-bottom:1px solid var(--border);background:var(--surface);flex-shrink:0}
.main-header #currentChatTitle{flex:1;font-size:.84rem;font-weight:600;color:var(--muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.status{display:flex;align-items:center;gap:6px;font-size:.75rem;color:var(--muted);flex-shrink:0}
.dot{width:7px;height:7px;border-radius:50%;background:#00b894;box-shadow:0 0 6px #00b894;animation:pulse 2s infinite}
.dot.busy{background:#fdcb6e;box-shadow:0 0 6px #fdcb6e}
.dot.err{background:var(--red);box-shadow:0 0 6px var(--red);animation:none}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}

.chat-area{flex:1;overflow-y:auto;padding:20px;display:flex;flex-direction:column;gap:14px;scroll-behavior:smooth}
.chat-area::-webkit-scrollbar{width:4px}
.chat-area::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px}
.msg{display:flex;gap:10px;animation:fadeIn .2s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
.msg.user{flex-direction:row-reverse;align-self:flex-end;max-width:80%}
.msg.bot{align-self:flex-start;max-width:80%}
.avatar{width:32px;height:32px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:800;flex-shrink:0;margin-top:2px;color:#fff}
.bot .avatar{background:linear-gradient(135deg,var(--accent),var(--accent2))}
.user .avatar{background:var(--card);border:1px solid var(--border);color:var(--text);font-weight:600}
.bubble{padding:10px 14px;border-radius:14px;font-size:.88rem;line-height:1.65}
.bot .bubble{background:var(--card);border:1px solid var(--border);border-top-left-radius:4px}
.user .bubble{background:linear-gradient(135deg,rgba(108,92,231,.22),rgba(0,206,201,.1));border:1px solid rgba(108,92,231,.3);border-top-right-radius:4px;text-align:right}
.bubble img{max-width:220px;border-radius:10px;margin-top:6px;display:block}
.bubble a{color:var(--accent2);text-decoration:none}
.bubble a:hover{text-decoration:underline}
.search-chip{display:inline-flex;align-items:center;gap:6px;background:rgba(0,206,201,.1);border:1px solid rgba(0,206,201,.25);border-radius:8px;padding:7px 13px;color:var(--accent2);text-decoration:none;font-size:.8rem;margin-top:8px;transition:.15s}
.search-chip:hover{background:rgba(0,206,201,.2)}
.dots span{display:inline-block;width:6px;height:6px;border-radius:50%;background:var(--muted);margin:0 2px;animation:bounce 1.2s infinite}
.dots span:nth-child(2){animation-delay:.2s}
.dots span:nth-child(3){animation-delay:.4s}
@keyframes bounce{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-6px)}}

/* HERO (empty new-chat state) */
.hero-state{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:20px}
.hero-logo{width:54px;height:54px;border-radius:16px;background:linear-gradient(135deg,var(--accent),var(--accent2));display:flex;align-items:center;justify-content:center;font-size:24px;font-weight:800;color:#fff;margin-bottom:16px}
.hero-state h1{font-size:1.35rem;margin-bottom:6px}
.hero-state p{color:var(--muted);font-size:.86rem;margin-bottom:22px}
.hero-quick{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;max-width:480px}

.bottom{padding:14px 20px 18px;border-top:1px solid var(--border);background:var(--surface);flex-shrink:0}
.qa-btn{background:var(--card);border:1px solid var(--border);border-radius:100px;color:var(--muted);padding:5px 14px;font-size:.78rem;cursor:pointer;font-family:'Inter',sans-serif;transition:.15s}
.qa-btn:hover{border-color:var(--accent);color:var(--accent)}
.attach-preview{display:none;align-items:center;gap:10px;background:var(--card);border:1px solid var(--border);border-radius:10px;padding:6px 12px;margin-bottom:10px;font-size:.8rem;color:var(--muted)}
.attach-preview button{background:none;border:none;color:var(--muted);cursor:pointer;font-size:.9rem;margin-left:auto}
.input-row{display:flex;gap:10px;align-items:center;background:var(--card);border:1px solid var(--border);border-radius:14px;padding:8px 8px 8px 16px;transition:.2s}
.input-row:focus-within{border-color:var(--accent)}
#userInput{flex:1;background:none;border:none;outline:none;color:var(--text);font-family:'Inter',sans-serif;font-size:.9rem;resize:none;height:24px;max-height:120px;overflow-y:auto;line-height:1.5}
#userInput::placeholder{color:var(--muted)}
.icon-btn{width:36px;height:36px;border-radius:10px;border:none;background:var(--border);color:var(--muted);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px;transition:.2s;flex-shrink:0}
.icon-btn:hover{background:rgba(108,92,231,.2);color:var(--accent)}
.icon-btn.listening{background:rgba(225,112,85,.2);color:var(--red);animation:mpulse 1s infinite}
@keyframes mpulse{0%,100%{box-shadow:0 0 0 0 rgba(225,112,85,.4)}50%{box-shadow:0 0 0 8px rgba(225,112,85,0)}}
.send-btn{width:36px;height:36px;border-radius:10px;border:none;background:linear-gradient(135deg,var(--accent),#5a4adf);color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:15px;transition:.2s;flex-shrink:0}
.send-btn:hover{transform:scale(1.05);box-shadow:0 4px 16px rgba(108,92,231,.4)}
.send-btn:disabled{opacity:.4;cursor:not-allowed;transform:none;box-shadow:none}
.hint{font-size:.72rem;color:var(--muted);text-align:center;margin-top:8px}

.setup-card{max-width:480px;margin:auto;background:var(--card);border:1px solid var(--border);border-radius:16px;padding:28px;text-align:center}
.setup-card h2{font-size:1.1rem;margin-bottom:10px}
.setup-card p{color:var(--muted);font-size:.85rem;line-height:1.6;margin-bottom:16px}
.setup-card input{width:100%;padding:10px 14px;background:var(--surface);border:1px solid var(--border);border-radius:10px;color:var(--text);font-family:monospace;font-size:.8rem;margin-bottom:12px}
.setup-card button{width:100%;padding:11px;background:linear-gradient(135deg,var(--accent),#5a4adf);border:none;border-radius:10px;color:#fff;font-weight:600;cursor:pointer;font-size:.9rem}

/* CONTACT MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);display:none;align-items:center;justify-content:center;z-index:50}
.modal-box{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:30px;max-width:320px;text-align:center;position:relative}
.modal-close{position:absolute;top:12px;right:12px;background:none;border:none;color:var(--muted);font-size:1.1rem;cursor:pointer;line-height:1}
.modal-close:hover{color:var(--text)}
.discord-icon{width:54px;height:54px;border-radius:16px;background:#5865F2;display:flex;align-items:center;justify-content:center;font-size:24px;margin:0 auto 14px;color:#fff}
.modal-box h2{font-size:1.05rem;margin-bottom:8px}
.modal-box p{color:var(--muted);font-size:.82rem;margin-bottom:18px;line-height:1.5}
.discord-btn{display:inline-block;background:#5865F2;color:#fff;padding:10px 26px;border-radius:10px;text-decoration:none;font-weight:600;font-size:.85rem}
.discord-btn:hover{background:#4752c4}

/* SETTINGS MODAL */
.settings-box{max-width:360px;text-align:left}
.settings-box h2{text-align:center;margin-bottom:18px}
.settings-avatar-row{display:flex;align-items:center;gap:14px;margin-bottom:20px}
.settings-avatar-preview{width:56px;height:56px;border-radius:50%;overflow:hidden;flex-shrink:0;background:var(--surface);border:1px solid var(--border);display:flex;align-items:center;justify-content:center}
.settings-avatar-preview img{width:100%;height:100%;object-fit:cover}
.avatar-letter{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:1.2rem;background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff}
.settings-mini-btn{background:var(--surface);border:1px solid var(--border);border-radius:8px;color:var(--text);padding:6px 12px;font-size:.76rem;cursor:pointer;font-family:'Inter',sans-serif}
.settings-mini-btn:hover{border-color:var(--accent)}
.settings-label{display:block;font-size:.76rem;color:var(--muted);margin-bottom:6px;font-weight:600}
.settings-box input[type="text"]{width:100%;padding:9px 12px;background:var(--surface);border:1px solid var(--border);border-radius:9px;color:var(--text);font-family:'Inter',sans-serif;font-size:.85rem;margin-bottom:10px}
.settings-save-btn{width:100%;padding:9px;background:linear-gradient(135deg,var(--accent),#5a4adf);border:none;border-radius:9px;color:#fff;font-weight:600;cursor:pointer;font-size:.84rem;margin-bottom:16px}
.settings-action{display:flex;align-items:center;gap:10px;width:100%;text-align:left;padding:10px 4px;background:none;border:none;color:var(--text);font-size:.84rem;cursor:pointer;font-family:'Inter',sans-serif;border-radius:8px}
.settings-action:hover{background:var(--surface)}
.settings-action.danger{color:var(--red)}
</style>
</head>
<body>
<div class="app-shell">

  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <div class="logo">W</div>
      <h1>WolfAI</h1>
    </div>
    <button class="new-chat-btn" onclick="createNewChat()">＋ New chat</button>
    <div class="chat-list" id="chatList"></div>
    <div class="sidebar-divider"></div>
    <div class="nav-item disabled" title="Coming soon">
      <span>🔍</span>
      <div class="nav-label"><b>Explore</b><small>In development</small></div>
    </div>
    <div class="nav-item disabled" title="Coming soon">
      <span>🛠️</span>
      <div class="nav-label"><b>Tools</b><small>In development</small></div>
    </div>
    <div class="nav-item" onclick="openContactModal()">
      <span>💬</span>
      <div class="nav-label"><b>Contact us</b></div>
    </div>
    <div id="modNavSlot"></div>
    <div class="user-row" id="userRow"></div>
  </aside>

  <main class="main-area">
    <div class="main-header">
      <button class="icon-btn" onclick="toggleSidebar()" title="Toggle sidebar">☰</button>
      <span id="currentChatTitle">New chat</span>
      <div class="status"><div class="dot" id="statusDot"></div><span id="statusText">Ready</span></div>
    </div>

    <div class="chat-area" id="chatArea"></div>

    <div class="bottom">
      <div class="attach-preview" id="attachPreview"></div>
      <div class="input-row">
        <input type="file" id="fileInput" accept="image/*,.txt" style="display:none" onchange="handleFileSelect(event)">
        <button class="icon-btn" id="attachBtn" onclick="document.getElementById('fileInput').click()" title="Attach a photo or text file">📎</button>
        <textarea id="userInput" placeholder="Type a message or press 🎙 to speak..." rows="1"
          onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
        <button class="icon-btn" id="micBtn" onclick="toggleMic()">🎙</button>
        <button class="send-btn" id="sendBtn" onclick="sendMessage()">➤</button>
      </div>
      <p class="hint">Press Enter to send &nbsp;·&nbsp; Shift+Enter for new line &nbsp;·&nbsp; 🎙 voice &nbsp;·&nbsp; 📎 attach</p>
    </div>
  </main>
</div>

<div class="modal-overlay" id="contactModal" onclick="if(event.target===this) closeContactModal()">
  <div class="modal-box">
    <button class="modal-close" onclick="closeContactModal()">✕</button>
    <div class="discord-icon">🎮</div>
    <h2>Join our Discord</h2>
    <p>Got questions, feedback, or just want to hang out? Join the WolfAI community on Discord.</p>
    <a class="discord-btn" href="https://discord.gg/56NSWnW2" target="_blank">Join Discord</a>
  </div>
</div>

<div class="modal-overlay" id="settingsModal" onclick="if(event.target===this) closeSettingsModal()">
  <div class="modal-box settings-box">
    <button class="modal-close" onclick="closeSettingsModal()">✕</button>
    <h2>⚙️ Settings</h2>

    <div class="settings-avatar-row">
      <div class="settings-avatar-preview" id="avatarPreview"></div>
      <div style="display:flex;gap:6px;flex-wrap:wrap">
        <input type="file" id="avatarInput" accept="image/*" style="display:none" onchange="handleAvatarSelect(event)">
        <button class="settings-mini-btn" onclick="document.getElementById('avatarInput').click()">Change photo</button>
        <button class="settings-mini-btn" onclick="removeAvatar()">Remove</button>
      </div>
    </div>

    <label class="settings-label">Your name</label>
    <input type="text" id="settingsNameInput" placeholder="Your name">
    <button class="settings-save-btn" onclick="saveSettingsName()">Save name</button>

    <div class="sidebar-divider" style="margin:4px 0 8px"></div>

    <button class="settings-action" onclick="shareWolfAI()">🔗 Share WolfAI</button>
    <button class="settings-action" onclick="clearMyChats()">🗑️ Clear my chat history</button>
    <button class="settings-action danger" onclick="resetEverything()">⚠️ Reset everything</button>
  </div>
</div>

<script>
// ── CONFIG ──────────────────────────────────────────────────────
const WORKER_URL = "https://broad-salad-8410.amiru12av.workers.dev";
const FIREBASE_URL = "https://wolfai-5b255-default-rtdb.asia-southeast1.firebasedatabase.app";

const SYSTEM_PROMPT_BASE = `You are WolfAI, a friendly, genuinely intelligent personal AI assistant, created and developed by wolfixe.
If anyone asks who made you, who your creator/developer/owner is, or who built this assistant, answer "wolfixe" — never mention Gemini, Google, or any other AI provider/company as your creator. You are simply "WolfAI".
If anyone asks about wolfixe (your creator), you can share: wolfixe enjoys watching anime — especially gritty, character-driven series like Vinland Saga, Demon Slayer, and Attack on Titan — and is into Minecraft modding/building and browser-based game development.
You understand and respond naturally to ANY question or message — in English, Sinhala script, or Romanized Sinhala (Singlish). Always reply in the same language/style the user used.
Keep replies conversational, warm, and reasonably concise (2-5 sentences unless more detail is clearly needed).
You can see images the user attaches and answer questions about them.
If the user wants to search the web or open a specific well-known website, respond ONLY with this exact JSON (nothing else, no markdown fences):
{"action":"search","query":"<search terms>","reply":"<short spoken reply>"}
or
{"action":"open","url":"<full url like https://youtube.com>","reply":"<short spoken reply>"}
For everything else, just reply normally in plain text — no JSON, no code fences.`;

// ── WHITELIST / ROLES ─────────────────────────────────────────
const OWNER_NAME = 'wolfixe123';
const MODERATOR_NAMES = ['zenitsu', 'cenzo'];
function getUserRole(name) {
  const n = (name || '').trim().toLowerCase();
  if (n === OWNER_NAME) return 'owner';
  if (MODERATOR_NAMES.includes(n)) return 'moderator';
  return null;
}

// ── STATE ───────────────────────────────────────────────────────
let history = [];
let listening = false;
let recognition = null;
let pendingAttachment = null;
let chats = [];
let currentChatId = null;
let heroShowing = false;
let isSending = false;
let modPollInterval = null;

// ── MEMORY (localStorage) ──────────────────────────────────────
function getMemories() {
  try { return JSON.parse(localStorage.getItem('wolfai_memories') || '[]'); } catch(e){ return []; }
}
function addMemory(fact) {
  const mems = getMemories();
  mems.push(fact);
  localStorage.setItem('wolfai_memories', JSON.stringify(mems.slice(-30)));
}
function detectMemoryCommand(text) {
  let m = text.match(/^(?:please\s+)?(?:remember|note)(?:\s+that)?\s+(.+)/i);
  if (m) return m[1].trim();
  m = text.match(/^(?:මතක\s*තියාගන්න|mathaka\s+thiya(?:ganna)?)\s*[,:]?\s*(.+)/i);
  if (m) return m[1].trim();
  return null;
}
function buildSystemPrompt() {
  const name = localStorage.getItem('wolfai_user_name');
  const mems = getMemories();
  let prompt = SYSTEM_PROMPT_BASE;
  if (name) {
    prompt += `\n\nThe person you're talking to is named "${name}". Address them by name naturally sometimes, but don't overdo it.`;
    const role = getUserRole(name);
    if (role === 'owner') prompt += `\nThis person IS wolfixe, your creator and owner. You can acknowledge this naturally if it comes up.`;
    else if (role === 'moderator') prompt += `\nThis person is a moderator of WolfAI, trusted by wolfixe. You can acknowledge this naturally if it comes up.`;
  }
  if (mems.length) prompt += `\n\nThings this user has asked you to remember:\n` + mems.map(m=>`- ${m}`).join('\n');
  return prompt;
}

// ── CHAT SESSIONS (sidebar history) ──────────────────────────────
function loadChats() { try { return JSON.parse(localStorage.getItem('wolfai_chats') || '[]'); } catch(e){ return []; } }
function saveChatsToStorage() { localStorage.setItem('wolfai_chats', JSON.stringify(chats)); }

function renderSidebarChats() {
  const list = document.getElementById('chatList');
  if (!chats.length) { list.innerHTML = `<div class="empty-chats">No chats yet — start one!</div>`; return; }
  list.innerHTML = chats.map(c => `
    <div class="chat-item ${c.id===currentChatId?'active':''}" onclick="switchChat('${c.id}')">
      <span>${escHtml(c.title)}</span>
      <button class="del-btn" onclick="event.stopPropagation();deleteChat('${c.id}')" title="Delete">✕</button>
    </div>`).join('');
}
function renderUserRow() {
  const name = localStorage.getItem('wolfai_user_name') || 'Guest';
  const avatar = localStorage.getItem('wolfai_avatar');
  const role = getUserRole(name);
  const badge = role === 'owner' ? '<span class="role-badge owner">👑 Owner</span>'
              : role === 'moderator' ? '<span class="role-badge mod">🛡️ Moderator</span>' : '';
  const avatarHtml = avatar ? `<img src="${avatar}" style="width:100%;height:100%;object-fit:cover;border-radius:50%">` : escHtml(name[0].toUpperCase());

    <div class="user-avatar">${avatarHtml}</div>
    <div style="display:flex;flex-direction:column;gap:3px;overflow:hidden;flex:1">
      <span style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${escHtml(name)}</span>${badge}
    </div>
    <button class="icon-btn" style="width:28px;height:28px;font-size:13px" onclick="openSettingsModal()" title="Settings">⚙️</button>`;
}
function renderModNav() {
  const slot = document.getElementById('modNavSlot');
  const name = localStorage.getItem('wolfai_user_name');
  const role = getUserRole(name);
  if (!role) { slot.innerHTML = ''; return; }
  slot.innerHTML = `
    <div class="nav-item" onclick="showModeratorPanel()">
      <span>👮</span>
      <div class="nav-label"><b>Moderators</b></div>
    </div>`;
}
function createNewChat() {
  if (modPollInterval) { clearInterval(modPollInterval); modPollInterval = null; }
  currentChatId = null;
  history = [];
  showHeroState();
  document.getElementById('currentChatTitle').textContent = 'New chat';
  renderSidebarChats();
}
function showHeroState() {
  heroShowing = true;
  const name = localStorage.getItem('wolfai_user_name') || 'there';
  document.getElementById('chatArea').innerHTML = `
    <div class="hero-state">
      <div class="hero-logo">W</div>
      <h1>Welcome, ${escHtml(name)}!</h1>
      <p>I'm WolfAI — ask me anything, in English or Sinhala.</p>
      <div class="hero-quick">
        <button class="qa-btn" onclick="quickSend('What can you do?')">💡 What can you do?</button>
        <button class="qa-btn" onclick="quickSend('latest news today')">🔍 Latest news</button>
        <button class="qa-btn" onclick="quickSend('tell me a joke')">😄 Joke</button>
        <button class="qa-btn" onclick="quickSend('weather in colombo')">🌤️ Weather</button>
        <button class="qa-btn" onclick="quickSend('open youtube')">▶️ YouTube</button>
      </div>
    </div>`;
}
function ensureChatPersisted(firstText) {
  if (currentChatId) return;
  const id = 'chat_' + Date.now();
  let title = (firstText || 'New chat').trim();
  title = title.length > 32 ? title.slice(0,32) + '…' : title;
  chats.unshift({ id, title, apiHistory: [], displayLog: [], createdAt: Date.now() });
  currentChatId = id;
  saveChatsToStorage();
  renderSidebarChats();
  document.getElementById('currentChatTitle').textContent = title;
}
function getCurrentChat() { return chats.find(c => c.id === currentChatId); }
function persistDisplay(role, html) {
  const chat = getCurrentChat();
  if (!chat) return;
  chat.displayLog.push({ role, html });
  chat.apiHistory = history;
  saveChatsToStorage();
}
function switchChat(id) {
  if (modPollInterval) { clearInterval(modPollInterval); modPollInterval = null; }
  const chat = chats.find(c => c.id === id);
  if (!chat) return;
  currentChatId = id;
  history = chat.apiHistory || [];
  heroShowing = false;
  document.getElementById('chatArea').innerHTML = '';
  chat.displayLog.forEach(entry => addMsg(entry.role, entry.html));
  document.getElementById('currentChatTitle').textContent = chat.title;
  renderSidebarChats();
}
function deleteChat(id) {
  chats = chats.filter(c => c.id !== id);
  saveChatsToStorage();
  if (currentChatId === id) createNewChat();
  else renderSidebarChats();
}
function toggleSidebar() { document.getElementById('sidebar').classList.toggle('collapsed'); }

// ── MODERATOR DASHBOARD ──────────────────────────────────────
function showModeratorPanel() {
  if (modPollInterval) { clearInterval(modPollInterval); modPollInterval = null; }
  heroShowing = false;
  currentChatId = null;
  renderSidebarChats();
  document.getElementById('currentChatTitle').textContent = 'Moderators';
  document.getElementById('chatArea').innerHTML = `
    <div class="mod-panel">
      <h2>👮 Moderator Dashboard</h2>
      <div class="mod-stats">
        <div class="mod-stat-card"><div class="mod-stat-num" id="modUserCount">—</div><div class="mod-stat-label">Total people who've used WolfAI</div></div>
      </div>
      <h3>Recently active</h3>
      <div id="modUserList" class="mod-user-list">Loading…</div>
    </div>`;
  loadModeratorData();
  modPollInterval = setInterval(loadModeratorData, 8000);
}
async function loadModeratorData() {
  const listEl = document.getElementById('modUserList');
  const countEl = document.getElementById('modUserCount');
  if (!listEl || !countEl) return;
  if (!FIREBASE_URL || FIREBASE_URL.includes('PASTE_YOUR')) {
    listEl.innerHTML = `<div class="mod-user-row" style="color:var(--muted)">User-tracking database isn't connected.</div>`;
    return;
  }
  try {
    const res = await fetch(`${FIREBASE_URL}/users.json`);
    const data = await res.json();
    const rows = data ? Object.values(data).sort((a,b) => new Date(b.lastSeen) - new Date(a.lastSeen)) : [];
    countEl.textContent = rows.length;
    listEl.innerHTML = rows.length
      ? rows.map(u => `<div class="mod-user-row"><span>${escHtml(u.name)}</span><small>${new Date(u.lastSeen).toLocaleString()}</small></div>`).join('')
      : `<div class="mod-user-row" style="color:var(--muted)">No one's been logged yet.</div>`;
  } catch(e) {
    listEl.innerHTML = `<div class="mod-user-row" style="color:var(--muted)">Couldn't load data right now.</div>`;
  }
}

// ── FIREBASE LOGGING (optional, owner-visible user list) ────────
async function logUserToFirebase(name) {
  if (!FIREBASE_URL || FIREBASE_URL.includes('PASTE_YOUR')) return;
  try {
    const safeKey = name.replace(/[.#$\[\]\/\s]/g, '_').toLowerCase();
    await fetch(`${FIREBASE_URL}/users/${encodeURIComponent(safeKey)}.json`, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ name, lastSeen: new Date().toISOString() })
    });
  } catch(e) { /* fail silently, non-critical */ }
}
async function showRegisteredUsers() {
  if (!FIREBASE_URL || FIREBASE_URL.includes('PASTE_YOUR')) {
    addMsg('bot', "The user-tracking database isn't set up yet, so I can't show that list.");
    return;
  }
  try {
    const res = await fetch(`${FIREBASE_URL}/users.json`);
    const data = await res.json();
    if (!data) { addMsg('bot', "No one's been logged yet."); return; }
    const rows = Object.values(data).sort((a,b) => new Date(b.lastSeen) - new Date(a.lastSeen));
    const list = rows.map(u => `• ${escHtml(u.name)} <span style="color:var(--muted);font-size:.72rem">(${new Date(u.lastSeen).toLocaleString()})</span>`).join('<br>');
    addMsg('bot', `<b>👥 People who've used WolfAI:</b><br>${list}`);
  } catch(e) {
    addMsg('bot', "Couldn't fetch the user list right now.");
  }
}

// ── ATTACHMENTS ─────────────────────────────────────────────────
function handleFileSelect(e) {
  const file = e.target.files[0];
  if (!file) return;
  if (file.type.startsWith('image/')) {
    const reader = new FileReader();
    reader.onload = () => {
      pendingAttachment = { type:'image', mimeType:file.type, base64:reader.result.split(',')[1], name:file.name, previewUrl:reader.result };
      showAttachPreview(`🖼️ ${file.name}`);
    };
    reader.readAsDataURL(file);
  } else if (file.type === 'text/plain' || file.name.endsWith('.txt')) {
    const reader = new FileReader();
    reader.onload = () => {
      pendingAttachment = { type:'text', content:reader.result, name:file.name };
      showAttachPreview(`📄 ${file.name}`);
    };
    reader.readAsText(file);
  } else {
    alert('Only images and .txt files are supported right now.');
  }
  e.target.value = '';
}
function showAttachPreview(label) {
  const bar = document.getElementById('attachPreview');
  bar.style.display = 'flex';
  bar.innerHTML = `<span>${escHtml(label)}</span><button onclick="clearAttachment()">✕</button>`;
}
function clearAttachment() {
  pendingAttachment = null;
  const bar = document.getElementById('attachPreview');
  bar.style.display = 'none'; bar.innerHTML = '';
}

// ── SEND ────────────────────────────────────────────────────────
async function sendMessage() {
  if (isSending) return;
  const input = document.getElementById('userInput');
  const text  = input.value.trim();
  if (!text && !pendingAttachment) return;
  isSending = true;
  input.value = ''; autoResize(input);

  if (heroShowing) { heroShowing = false; document.getElementById('chatArea').innerHTML = ''; }

  // owner admin command (not saved as a chat)
  if (/^(show users|show registered users|wolfai admin)$/i.test(text.trim())) {
    addMsg('user', escHtml(text));
    showRegisteredUsers();
    isSending = false;
    return;
  }

  ensureChatPersisted(text || (pendingAttachment ? pendingAttachment.name : 'New chat'));

  // memory command (handled instantly, no AI call needed)
  const memFact = detectMemoryCommand(text);
  if (memFact && !pendingAttachment) {
    const userHtml = escHtml(text);
    addMsg('user', userHtml); persistDisplay('user', userHtml);
    addMemory(memFact);
    const replyHtml = escHtml(`Got it, I'll remember that: "${memFact}" 🧠`);
    addMsg('bot', replyHtml); persistDisplay('bot', replyHtml);
    speak(`Got it, I'll remember that.`);
    isSending = false;
    return;
  }

  // build display + API parts
  let displayHtml = escHtml(text);
  const parts = [];
  let outgoingText = text;

  if (pendingAttachment?.type === 'text') {
    outgoingText += `\n\n[Attached document "${pendingAttachment.name}"]:\n${pendingAttachment.content}`;
    displayHtml += `<br><span style="color:var(--muted);font-size:.78rem">📄 ${escHtml(pendingAttachment.name)}</span>`;
  }
  parts.push({ text: outgoingText || "Describe this image." });
  if (pendingAttachment?.type === 'image') {
    parts.push({ inlineData: { mimeType: pendingAttachment.mimeType, data: pendingAttachment.base64 } });
    displayHtml += `<img src="${pendingAttachment.previewUrl}">`;
  }

  addMsg('user', displayHtml);
  persistDisplay('user', displayHtml);
  history.push({ role:'user', parts });
  if (history.length > 20) history = history.slice(-20);
  clearAttachment();

  document.getElementById('sendBtn').disabled = true;
  const typingId = addTyping();
  setStatus('Thinking...', 'busy');

  try {
    const raw = await callGemini();
    removeTyping(typingId);
    handleReply(raw);
    setStatus('Ready');
  } catch (err) {
    removeTyping(typingId);
    const errHtml = `Sorry, I couldn't reach the AI right now. (${escHtml(err.message)})`;
    addMsg('bot', errHtml); persistDisplay('bot', errHtml);
    setStatus('Error', 'err');
    setTimeout(() => setStatus('Ready'), 4000);
  }
  document.getElementById('sendBtn').disabled = false;
  isSending = false;
}

function quickSend(t) { document.getElementById('userInput').value = t; sendMessage(); }

// ── AI CALL (via secure proxy — key never touches the browser) ──
async function callGemini() {
  const res = await fetch(WORKER_URL, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ contents: history, systemInstruction: { parts:[{ text: buildSystemPrompt() }] } })
  });
  if (!res.ok) {
    const errBody = await res.json().catch(() => ({}));
    throw new Error(errBody?.error?.message || `HTTP ${res.status}`);
  }
  const data = await res.json();
  const raw = data?.candidates?.[0]?.content?.parts?.[0]?.text || "";
  if (!raw) throw new Error("Empty response");
  return raw.trim();
}

function handleReply(raw) {
  let reply = raw, action = null;
  try {
    const cleaned = raw.trim().replace(/```json|```/g,'').trim();
    if (cleaned.startsWith('{')) {
      const parsed = JSON.parse(cleaned);
      if (parsed.action) { action = parsed; reply = parsed.reply || reply; }
    }
  } catch(e) {}

  history.push({ role:'model', parts:[{ text: raw }] });

  let finalHtml;
  if (action?.action === 'search') {
    const url = `https://www.google.com/search?q=${encodeURIComponent(action.query)}`;
    finalHtml = `${escHtml(reply)}<br><a class="search-chip" href="${url}" target="_blank">🔍 Open Google: "${escHtml(action.query)}"</a>`;
  } else if (action?.action === 'open') {
    finalHtml = `${escHtml(reply)}<br><a class="search-chip" href="${action.url}" target="_blank">🌐 Open Link</a>`;
  } else {
    finalHtml = escHtml(reply).replace(/\n/g,'<br>');
  }
  addMsg('bot', finalHtml);
  persistDisplay('bot', finalHtml);
  speak(stripTags(reply));
}

// ── SPEECH ──────────────────────────────────────────────────────
function setupSTT() {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) return;
  recognition = new SR();
  recognition.lang = 'en-US';
  recognition.continuous = false;
  recognition.interimResults = false;
  recognition.onresult = e => { document.getElementById('userInput').value = e.results[0][0].transcript; stopListening(); sendMessage(); };
  recognition.onerror = recognition.onend = () => stopListening();
}
function toggleMic() {
  if (listening) { stopListening(); return; }
  if (!recognition) { alert('Speech recognition not supported. Please use Chrome!'); return; }
  listening = true; recognition.start();
  const btn = document.getElementById('micBtn');
  btn.classList.add('listening'); btn.textContent = '⏹';
  document.getElementById('userInput').placeholder = 'Listening...';
}
function stopListening() {
  listening = false;
  try { if (recognition) recognition.stop(); } catch(e){}
  const btn = document.getElementById('micBtn');
  btn.classList.remove('listening'); btn.textContent = '🎙';
  document.getElementById('userInput').placeholder = 'Type a message or press 🎙 to speak...';
}

let cachedVoices = [];
function loadVoices() { cachedVoices = window.speechSynthesis ? window.speechSynthesis.getVoices() : []; }
if (window.speechSynthesis) { window.speechSynthesis.onvoiceschanged = loadVoices; loadVoices(); }

function speak(text) {
  if (!window.speechSynthesis) return;
  window.speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  const hasSinhala = /[\u0D80-\u0DFF]/.test(text);
  u.lang = hasSinhala ? 'si-LK' : 'en-US';
  const siVoice = cachedVoices.find(v => v.lang && v.lang.toLowerCase().startsWith('si'));
  if (hasSinhala && siVoice) u.voice = siVoice;
  u.rate = 1.0;
  window.speechSynthesis.speak(u);
}

// ── UI ──────────────────────────────────────────────────────────
function addMsg(role, html) {
  const area = document.getElementById('chatArea');
  const div  = document.createElement('div');
  div.className = `msg ${role}`;
  let avatarHtml;
  if (role === 'bot') {
    avatarHtml = 'W';
  } else {
    const avatar = localStorage.getItem('wolfai_avatar');
    avatarHtml = avatar ? `<img src="${avatar}" style="width:100%;height:100%;object-fit:cover;border-radius:9px">` : '🙂';
  }
  div.innerHTML = `<div class="avatar">${avatarHtml}</div><div class="bubble">${html}</div>`;
  area.appendChild(div);
  area.scrollTop = area.scrollHeight;
}
let typingCounter = 0;
function addTyping() {
  const id = 'typing-' + (++typingCounter);
  const area = document.getElementById('chatArea');
  const div = document.createElement('div');
  div.className = 'msg bot'; div.id = id;
  div.innerHTML = `<div class="avatar">W</div><div class="bubble"><div class="dots"><span></span><span></span><span></span></div></div>`;
  area.appendChild(div); area.scrollTop = area.scrollHeight;
  return id;
}
function removeTyping(id) { const el = document.getElementById(id); if (el) el.remove(); }
function setStatus(text, mode) {
  document.getElementById('statusText').textContent = text;
  document.getElementById('statusDot').className = 'dot' + (mode === 'busy' ? ' busy' : mode === 'err' ? ' err' : '');
}
function autoResize(el){ el.style.height='24px'; el.style.height=Math.min(el.scrollHeight,120)+'px'; }
function handleKey(e){ if(e.key==='Enter'&&!e.shiftKey){ e.preventDefault(); sendMessage(); } }
function escHtml(t){ return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function stripTags(t){ return t.replace(/<[^>]*>/g,''); }
</script>
