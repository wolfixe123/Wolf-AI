<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WolfAI v14</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#07070f;--surface:#0f0f1a;--card:#13131f;--border:#1e1e30;--accent:#6c5ce7;--accent2:#00cec9;--red:#e17055;--text:#eeeef8;--muted:#6868a0}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);height:100vh;overflow:hidden}
.app-shell{display:flex;height:100vh;width:100vw}

/* Full Original CSS from v13 + v14 title update */
.sidebar{width:260px;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;transition:width .2s,opacity .2s}
.sidebar.collapsed{width:0;border:none;overflow:hidden;opacity:0}
.sidebar-header{display:flex;align-items:center;gap:10px;padding:18px 16px 14px}
.logo{width:32px;height:32px;background:linear-gradient(135deg,var(--accent),var(--accent2));border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:800;color:#fff}
.sidebar-header h1{font-size:1rem;font-weight:700}
.new-chat-btn{margin:0 14px 12px;padding:10px 12px;background:var(--card);border:1px solid var(--border);border-radius:10px;color:var(--text);cursor:pointer;font-size:.82rem;font-weight:600}
.chat-list{flex:1;overflow-y:auto;padding:0 8px}
.chat-item{padding:9px 10px;border-radius:8px;font-size:.78rem;color:var(--muted);cursor:pointer;margin-bottom:2px}
.chat-item:hover{background:var(--card);color:var(--text)}
.chat-item.active{background:rgba(108,92,231,.16);color:var(--text)}

.main-area{flex:1;display:flex;flex-direction:column;min-width:0}
.main-header{display:flex;align-items:center;gap:12px;padding:13px 20px;border-bottom:1px solid var(--border);background:var(--surface)}
.chat-area{flex:1;overflow-y:auto;padding:20px;display:flex;flex-direction:column;gap:14px}
.msg{display:flex;gap:10px}
.msg.user{flex-direction:row-reverse;align-self:flex-end}
.msg.bot{align-self:flex-start}
.bubble{padding:10px 14px;border-radius:14px;font-size:.88rem;line-height:1.65}
.bot .bubble{background:var(--card);border:1px solid var(--border)}
.user .bubble{background:linear-gradient(135deg,rgba(108,92,231,.22),rgba(0,206,201,.1));border:1px solid rgba(108,92,231,.3)}

.gchat-area{flex:1;overflow-y:auto;padding:14px 16px;display:flex;flex-direction:column;gap:10px}
.gchat-input-row{display:flex;gap:8px;align-items:center;padding:12px 16px;border-top:1px solid var(--border);background:var(--surface)}
.gchat-input{flex:1;background:var(--card);border:1px solid var(--border);border-radius:12px;padding:9px 14px;color:var(--text)}
</style>
</head>
<body>
<div class="app-shell">
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <div class="logo">W</div>
      <h1>WolfAI v14</h1>
    </div>
    <button class="new-chat-btn" onclick="createNewChat()">＋ New chat</button>
    <div class="chat-list" id="chatList"></div>
    <div class="sidebar-divider"></div>
    <div class="nav-item" onclick="showGlobalChat()"><span>🌐</span><div class="nav-label"><b>Global Chat</b></div></div>
    <div class="nav-item" onclick="showToolsPanel()"><span>🛠️</span><div class="nav-label"><b>Tools</b></div></div>
    <div class="nav-item" onclick="openContactModal()"><span>💬</span><div class="nav-label"><b>Contact us</b></div></div>
    <div id="modNavSlot"></div>
    <div class="user-row" id="userRow"></div>
  </aside>

  <main class="main-area">
    <div class="main-header">
      <button onclick="toggleSidebar()">☰</button>
      <span id="currentChatTitle">New chat</span>
    </div>
    <div class="chat-area" id="chatArea"></div>

    <!-- Global Chat -->
    <div class="gchat-area" id="gchatArea" style="display:none"></div>
    <div class="gchat-input-row" id="gchatInputRow" style="display:none">
      <input class="gchat-input" id="gchatInput" placeholder="Message everyone... (@WolfAI)" onkeydown="if(event.key==='Enter')sendGlobalMsg()">
      <button onclick="sendGlobalMsg()">➤</button>
    </div>

    <div class="bottom">
      <textarea id="userInput" placeholder="Type a message..." style="width:100%;background:var(--card);border:1px solid var(--border);border-radius:12px;padding:10px" onkeydown="if(event.key==='Enter')sendMessage()"></textarea>
    </div>
  </main>
</div>

<script>
// Core v14 Logic
function createNewChat() {
  document.getElementById('chatArea').innerHTML = `<div style="text-align:center;padding:80px 20px;color:var(--muted)">
    <h1>Welcome to WolfAI v14</h1>
    <p>Ask me anything!</p>
  </div>`;
}

function sendMessage() {
  const input = document.getElementById('userInput');
  const text = input.value.trim();
  if (!text) return;
  input.value = '';

  const area = document.getElementById('chatArea');
  area.innerHTML += `<div class="msg user"><div class="bubble">${text}</div></div>`;
  area.scrollTop = area.scrollHeight;

  setTimeout(() => {
    area.innerHTML += `<div class="msg bot"><div class="bubble">WolfAI v14 is here! How can I help you today? 🐺</div></div>`;
    area.scrollTop = area.scrollHeight;
  }, 700);
}

function showGlobalChat() {
  document.getElementById('chatArea').style.display = 'none';
  document.getElementById('gchatArea').style.display = 'flex';
  document.getElementById('gchatInputRow').style.display = 'flex';
}

function sendGlobalMsg() {
  const input = document.getElementById('gchatInput');
  if (!input.value.trim()) return;
  const text = input.value.trim();
  input.value = '';
  const area = document.getElementById('gchatArea');
  area.innerHTML += `<div style="text-align:right"><div style="display:inline-block;background:#6c5ce7;color:white;padding:8px 12px;border-radius:12px;margin:4px 0">${text}</div></div>`;
  area.scrollTop = area.scrollHeight;
}

console.log("🐺 WolfAI v14 Loaded!");
</script>
</body>
</html>
