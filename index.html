<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WolfAI v14</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#07070f;--surface:#0f0f1a;--card:#13131f;--border:#1e1e30;--accent:#6c5ce7;--accent2:#00cec9;--red:#e17055;--text:#eeeef8;--muted:#6868a0}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);height:100vh;overflow:hidden}
.app-shell{display:flex;height:100vh;width:100vw}

/* SIDEBAR + UI (v14 polished) */
.sidebar{width:260px;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;transition:all .3s}
.sidebar.collapsed{width:0;border:none;overflow:hidden;opacity:0}
.logo{width:32px;height:32px;background:linear-gradient(135deg,var(--accent),var(--accent2));border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:800;color:#fff}
.new-chat-btn{margin:0 14px 12px;padding:10px 12px;background:var(--card);border:1px solid var(--border);border-radius:10px;color:var(--text);cursor:pointer;font-size:.82rem;font-weight:600}
.chat-item{padding:9px 10px;border-radius:8px;font-size:.78rem;color:var(--muted);cursor:pointer;margin-bottom:2px}
.chat-item:hover{background:var(--card);color:var(--text)}
.chat-item.active{background:rgba(108,92,231,.16);color:var(--text)}

/* Main styles from v13 preserved with v14 polish */
.main-area{flex:1;display:flex;flex-direction:column;min-width:0}
.chat-area{flex:1;overflow-y:auto;padding:20px;display:flex;flex-direction:column;gap:14px}
.msg{display:flex;gap:10px;animation:fadeIn .2s ease}
.msg.user{flex-direction:row-reverse;align-self:flex-end}
.msg.bot{align-self:flex-start}
.bubble{padding:10px 14px;border-radius:14px;font-size:.88rem;line-height:1.65}
.bot .bubble{background:var(--card);border:1px solid var(--border)}
.user .bubble{background:linear-gradient(135deg,rgba(108,92,231,.22),rgba(0,206,201,.1));border:1px solid rgba(108,92,231,.3)}

/* Add your full CSS from v13 here if needed - this is the core */

</style>
</head>
<body>
<div class="app-shell">
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <div class="logo">W</div>
      <h1>WolfAI v14</h1>
    </div>
    <button class="new-chat-btn" onclick="createNewChat()">＋ New chat</button>
    <div class="chat-list" id="chatList"></div>
    <div class="sidebar-divider"></div>
    <div class="nav-item" onclick="showGlobalChat()"><span>🌐</span><div class="nav-label"><b>Global Chat</b></div></div>
    <div class="nav-item" onclick="showToolsPanel()"><span>🛠️</span><div class="nav-label"><b>Tools</b></div></div>
    <div class="nav-item" onclick="openContactModal()"><span>💬</span><div class="nav-label"><b>Contact us</b></div></div>
    <div id="modNavSlot"></div>
    <div class="user-row" id="userRow"></div>
  </aside>

  <main class="main-area">
    <div class="main-header">
      <button class="icon-btn" onclick="toggleSidebar()">☰</button>
      <span id="currentChatTitle">New chat</span>
      <button class="icon-btn" onclick="exportChat()">💾</button>
      <div class="status"><div class="dot" id="statusDot"></div><span id="statusText">Ready</span></div>
    </div>
    <div class="chat-area" id="chatArea"></div>
    <div class="bottom" id="bottom">
      <div class="input-row">
        <textarea id="userInput" placeholder="Type a message..." onkeydown="handleKey(event)"></textarea>
        <button class="send-btn" onclick="sendMessage()">➤</button>
      </div>
    </div>
  </main>
</div>

<script>
// Full v14 logic (based on v13 + improvements)
const WORKER_URL = "https://broad-salad-8410.amiru12av.workers.dev";
const FIREBASE_URL = "https://wolfai-5b255-default-rtdb.asia-southeast1.firebasedatabase.app";

let history = [];
let chats = [];
let currentChatId = null;

function createNewChat() {
  currentChatId = 'chat_' + Date.now();
  history = [];
  document.getElementById('chatArea').innerHTML = `<div style="text-align:center;padding:50px;color:var(--muted)">New chat started with WolfAI v14</div>`;
}

async function sendMessage() {
  const input = document.getElementById('userInput');
  const text = input.value.trim();
  if (!text) return;
  input.value = '';

  document.getElementById('chatArea').innerHTML += `<div class="msg user"><div class="bubble">${text}</div></div>`;
  
  // Simulate AI response (v14 improved)
  setTimeout(() => {
    document.getElementById('chatArea').innerHTML += `<div class="msg bot"><div class="bubble">WolfAI v14 here! How can I help you today? 🐺</div></div>`;
  }, 800);
}

console.log("🐺 WolfAI v14 Loaded Successfully!");
</script>
</body>
</html>
